<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="a">
        <h1>Registration</h1>
        <label for="N">Name
            <input type="text" name="name" id="N" value="">
        </label>
        <br>
        <label for="sex">Sex:
        <input type="radio" name="sex" id="sex">Male
        <input type="radio" name="sex" id="sex">Female
        </label>
        <br>
        <label for="Country">
        Country
        <select name="Country" id="Country">
            <option value="default">Select</option>
            <option value="default">India</option>
            <option value="default">USA</option>
            <option value="default">UK</option>
        </select>
        </label>
        <br>
        <label for="ta">
        Message:
        <br>
        <textarea name="ta" rows="5" id="ta"></textarea>
        </label>
        <br>
        <label for="chk">Subscribe?
            <input type="checkbox" name="chk" id="chk">
        </label>
        <br>
        <button>Submit</button>
    </form>
</body>
</html>
